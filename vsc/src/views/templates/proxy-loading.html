<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--vscode-editor-background,#1e1e1e);color:var(--vscode-editor-foreground,#d4d4d4);font-family:var(--vscode-font-family,-apple-system,sans-serif)}
  .spinner{width:40px;height:40px;border:3px solid var(--vscode-editorWidget-border,#3c3c3c);border-top-color:var(--vscode-focusBorder,#007acc);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .container{text-align:center}
  .container p{margin-top:16px;font-size:14px;opacity:.8}
</style>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <p>Loading OpenCode…</p>
</div>
</body>
</html>
