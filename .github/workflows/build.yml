name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build vs/VSOpenCode.csproj -c Release

      - name: Upload VSIX
        uses: actions/upload-artifact@v7
        with:
          name: VSOpenCode.vsix
          path: vs/bin/Release/net472/VSOpenCode.vsix
