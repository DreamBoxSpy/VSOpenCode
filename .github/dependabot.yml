version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/vs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      microsoft-sdk:
        patterns:
          - "Microsoft.VisualStudio.SDK"
          - "Microsoft.VSSDK.BuildTools"
        update-types:
          - "minor"
          - "patch"
      microsoft-webview2:
        patterns:
          - "Microsoft.Web.WebView2"
    open-pull-requests-limit: 5
    target-branch: "main"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
    target-branch: "main"
